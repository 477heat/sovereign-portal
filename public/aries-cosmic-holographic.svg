<svg width="1536" height="1024" viewBox="0 0 1536 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Cinematic Holographic Aries in Nebula</title>
  <desc id="desc">Aries zodiac sign rendered as holographic emblem on faint nebula background</desc>
  <defs>
    <linearGradient id="bgCore" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050514"/>
      <stop offset="40%" stop-color="#0a0830"/>
      <stop offset="100%" stop-color="#01030d"/>
    </linearGradient>

    <radialGradient id="nebulaPink" cx="28%" cy="28%" r="52%">
      <stop offset="0%" stop-color="#ff3ec6" stop-opacity="0.24"/>
      <stop offset="45%" stop-color="#7b19e0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#09001f" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="nebulaBlue" cx="78%" cy="72%" r="55%">
      <stop offset="0%" stop-color="#18d4ff" stop-opacity="0.24"/>
      <stop offset="45%" stop-color="#2d53ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#070a1f" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="holo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7cf2ff" stop-opacity="0.95"/>
      <stop offset="28%" stop-color="#8d67ff" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#ff6ee8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#40ffb3" stop-opacity="0.95"/>
    </linearGradient>

    <linearGradient id="holoGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5ff5ff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#9b45ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3fd9ff" stop-opacity="0.1"/>
    </linearGradient>

    <filter id="aurora" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015 0.045" numOctaves="3" seed="19" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="28" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="starGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>

    <filter id="iris" x="-25%" y="-25%" width="150%" height="150%">
      <feTurbulence type="turbulence" baseFrequency="0.0018" numOctaves="3" seed="11" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="7" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <rect width="1536" height="1024" fill="url(#bgCore)"/>

  <g filter="url(#aurora)" opacity="0.75">
    <ellipse cx="420" cy="220" rx="360" ry="260" fill="url(#nebulaPink)"/>
    <ellipse cx="1120" cy="760" rx="420" ry="300" fill="url(#nebulaBlue)"/>
    <ellipse cx="780" cy="520" rx="520" ry="350" fill="url(#holoGlow)"/>
  </g>

  <g fill="none" opacity="0.95" filter="url(#starGlow)">
    <circle cx="220" cy="190" r="1.2" fill="#fff"/>
    <circle cx="390" cy="420" r="1" fill="#d9f7ff"/>
    <circle cx="590" cy="150" r="1.3" fill="#ffffff"/>
    <circle cx="730" cy="270" r="1" fill="#a6c8ff"/>
    <circle cx="940" cy="180" r="1.2" fill="#ffffff"/>
    <circle cx="1120" cy="300" r="1.1" fill="#ddf7ff"/>
    <circle cx="1320" cy="190" r="1" fill="#d1f3ff"/>
    <circle cx="150" cy="600" r="1" fill="#ffffff"/>
    <circle cx="320" cy="740" r="1.2" fill="#cde8ff"/>
    <circle cx="500" cy="840" r="1" fill="#ffffff"/>
    <circle cx="650" cy="910" r="1" fill="#a7d5ff"/>
    <circle cx="920" cy="860" r="1.1" fill="#ffffff"/>
    <circle cx="1240" cy="930" r="1" fill="#d3f3ff"/>
    <circle cx="1460" cy="690" r="1.2" fill="#f9feff"/>

    <circle cx="280" cy="340" r="0.9" fill="#ffffff"/>
    <circle cx="460" cy="230" r="0.9" fill="#d5eeff"/>
    <circle cx="720" cy="90" r="1.2" fill="#ffffff"/>
    <circle cx="990" cy="240" r="0.8" fill="#b8dcff"/>
    <circle cx="1215" cy="140" r="1" fill="#ffffff"/>
    <circle cx="1410" cy="400" r="0.8" fill="#d4f1ff"/>
    <circle cx="80" cy="230" r="0.7" fill="#ffffff"/>
    <circle cx="180" cy="460" r="0.8" fill="#c4ddff"/>

    <circle cx="180" cy="320" r="0.6" fill="#ffffff"/>
    <circle cx="260" cy="540" r="0.6" fill="#d2e8ff"/>
    <circle cx="420" cy="670" r="0.9" fill="#ffffff"/>
    <circle cx="620" cy="530" r="0.7" fill="#d3efff"/>
    <circle cx="760" cy="420" r="0.8" fill="#ffffff"/>
    <circle cx="900" cy="330" r="0.9" fill="#b3d8ff"/>
    <circle cx="1040" cy="470" r="0.6" fill="#f2fbff"/>
    <circle cx="1200" cy="560" r="0.7" fill="#d4ecff"/>
    <circle cx="1400" cy="560" r="0.8" fill="#ffffff"/>
    <circle cx="1380" cy="790" r="0.8" fill="#badfff"/>

    <circle cx="260" cy="850" r="0.8" fill="#ffffff"/>
    <circle cx="470" cy="930" r="1.1" fill="#d4ecff"/>
    <circle cx="700" cy="960" r="0.7" fill="#ffffff"/>
    <circle cx="960" cy="950" r="0.8" fill="#e4f5ff"/>
    <circle cx="1190" cy="930" r="0.7" fill="#d6f1ff"/>
    <circle cx="1440" cy="860" r="0.9" fill="#ffffff"/>

    <circle cx="380" cy="110" r="0.7" fill="#ffffff"/>
    <circle cx="540" cy="70" r="0.8" fill="#d0eaff"/>
    <circle cx="1010" cy="60" r="0.7" fill="#f4fbff"/>
  </g>

  <g>
    <ellipse cx="768" cy="700" rx="330" ry="170" fill="none" stroke="url(#holoGlow)" stroke-width="5" opacity="0.5" transform="rotate(-4 768 700)"/>

    <path d="M 768 700 C 680 590 640 470 700 390 C 740 330 836 330 882 390 C 930 450 900 560 830 640"
      fill="none" stroke="url(#holo)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" opacity="0.4" filter="url(#softGlow)"/>

    <path d="M 768 700 C 680 590 640 470 700 390 C 740 330 836 330 882 390 C 930 450 900 560 830 640"
      fill="none" stroke="url(#holo)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

    <path d="M 630 680 C 580 590 620 430 700 360 C 748 314 868 314 918 360 C 980 420 925 560 860 650"
      fill="none" stroke="url(#holo)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>

    <path d="M 520 750 C 580 640 560 520 640 450 C 700 400 840 400 898 450 C 980 520 950 640 885 740"
      fill="none" stroke="url(#holo)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>

    <path d="M 690 640 L 768 820 L 846 640"
      fill="none" stroke="url(#holo)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

    <path d="M 650 690 C 700 750 836 750 870 690"
      fill="none" stroke="url(#holo)" stroke-width="8" stroke-linecap="round" opacity="0.55"/>

    <g filter="url(#softGlow)" opacity="0.5">
      <circle cx="760" cy="640" r="42" fill="none" stroke="url(#holo)" stroke-width="4"/>
      <circle cx="760" cy="640" r="16" fill="#a7f5ff" opacity="0.25"/>
    </g>

    <circle cx="768" cy="700" r="3.8" fill="#dbfdff"/>
  </g>

  <g opacity="0.35" filter="url(#iris)">
    <path d="M 640 790 C 560 700 570 520 640 440 C 700 365 840 365 900 440 C 970 520 960 700 887 790"
      fill="none" stroke="url(#holo)" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="768" cy="670" rx="170" ry="90" fill="none" stroke="#7cf4ff" stroke-width="1.5" transform="rotate(-4 768 670)"/>
    <ellipse cx="768" cy="670" rx="220" ry="115" fill="none" stroke="#a78bff" stroke-width="1.5" transform="rotate(-4 768 670)"/>
  </g>

  <g font-family="" font-size="24" fill="#8cf7ff" opacity="0.42" letter-spacing="4">
    <text x="768" y="960" text-anchor="middle" filter="url(#softGlow)">COSMIC - ARIES</text>
  </g>
</svg>
